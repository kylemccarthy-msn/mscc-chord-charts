<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Charts — Mustard Seed Christian Church Tokyo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;
  --surface:#fff;
  --border:#e2e8f0;
  --ink:#0f172a;
  --sub:#64748b;
  --muted:#94a3b8;
  --dark:#1a1a1a;
  --dark-dim:#f3f4f6;
  --dark-bd:#d1d5db;
  --blue:#2563eb;
  --blue-dim:#eff6ff;
  --blue-bd:#bfdbfe;
  --green:#16a34a;
  --green-dim:#f0fdf4;
  --amber:#92400e;
  --amber-dim:#fffbeb;
  --amber-bd:#fde68a;
  --r:12px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --mono:'SF Mono','Courier New',monospace;
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh}

/* ── Topbar ─────────────────────────────────────────────────────── */
.topbar{
  background:#0f172a;color:#fff;
  padding:0 24px;height:52px;
  display:flex;align-items:center;gap:20px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.brand{font-size:14px;font-weight:700;flex:1;letter-spacing:-.1px}
.brand span{font-size:12px;opacity:.4;font-weight:400;margin-left:6px}
.t-meta{font-size:11px;opacity:.35;white-space:nowrap}
.t-zip{
  font-size:11px;font-weight:600;padding:4px 10px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:6px;color:rgba(255,255,255,.65);text-decoration:none;
  transition:background .15s;white-space:nowrap;
}
.t-zip:hover{background:rgba(255,255,255,.16);color:#fff}

/* ── Page ───────────────────────────────────────────────────────── */
.page{max-width:880px;margin:0 auto;padding:0 20px}

/* ── Search + filter ────────────────────────────────────────────── */
.search-area{padding:22px 0 14px}
.search-wrap{position:relative}
.si{position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;font-size:15px}
.search{width:100%;padding:11px 13px 11px 38px;border:1.5px solid var(--border);
  border-radius:var(--r);font-size:14px;background:#fff;color:var(--ink);
  outline:none;transition:border-color .15s,box-shadow .15s}
.search:focus{border-color:var(--dark);box-shadow:0 0 0 3px rgba(0,0,0,.07)}
.search::placeholder{color:var(--muted)}
.filter-row{display:flex;align-items:center;gap:6px;margin-top:9px}
.pill{padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);
  font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--sub);
  transition:all .12s;white-space:nowrap}
.pill:hover{border-color:var(--dark);color:var(--dark)}
.pill.on{background:var(--dark);color:#fff;border-color:var(--dark)}
.rcount{margin-left:auto;font-size:12px;color:var(--muted)}

/* ── Group header ───────────────────────────────────────────────── */
.gh{display:flex;align-items:center;gap:10px;padding:10px 0 8px}
.gh-lbl{font-size:10px;font-weight:700;letter-spacing:.9px;
  text-transform:uppercase;color:var(--muted);white-space:nowrap}
.gh-line{flex:1;height:1px;background:var(--border)}

/* ── Song cards ─────────────────────────────────────────────────── */
.cards{display:flex;flex-direction:column;gap:10px;padding-bottom:60px}
.card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  overflow:hidden;
}

/* card head */
.card-head{
  padding:13px 16px 10px;
  display:flex;align-items:flex-start;gap:10px;
}
.card-title-block{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-title-sub{font-size:12px;color:var(--sub);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-title-jp{font-size:12px;color:var(--muted);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:11px;color:var(--muted);margin-top:3px}
.card-badges{display:flex;gap:5px;align-items:center;flex-shrink:0;margin-top:2px}
.bdg{font-size:10px;font-weight:700;border-radius:5px;padding:2px 6px;
  white-space:nowrap;letter-spacing:.1px}
.bdg-pt{background:var(--dark);color:#fff}
.bdg-en{background:#374151;color:#fff}

/* card body — 3 columns */
.card-body{
  padding:12px 16px 16px;
  display:flex;gap:0;
  border-top:1.5px solid var(--border);
  align-items:flex-start;
}
.cb-col{padding:0 14px}
.cb-col:first-child{padding-left:0}
.cb-col:last-child{padding-right:0}
.cb-col+.cb-col{border-left:1px solid var(--border)}
.cb-listen{flex:0 0 auto;min-width:130px}
.cb-charts{flex:1 1 auto;min-width:0}
.cb-key{flex:0 0 auto;min-width:90px;
  display:flex;flex-direction:column;align-items:center;gap:8px}

/* section label */
.slbl{
  font-size:10px;font-weight:900;text-transform:uppercase;
  letter-spacing:.9px;color:#475569;
  margin-bottom:9px;padding-bottom:6px;
  border-bottom:1.5px solid var(--border);
  display:block;
}

/* ── Listen section ─────────────────────────────────────────────── */
.listen-rows{display:flex;flex-direction:column;gap:7px}
.listen-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.listen-flag{font-size:17px;flex-shrink:0;line-height:1}
.listen-btns{display:flex;gap:5px;flex-wrap:wrap}
.ab{
  display:inline-flex;align-items:center;gap:3px;
  padding:4px 10px;border-radius:6px;
  border:1px solid var(--border);
  font-size:11px;font-weight:600;text-decoration:none;
  background:#f9fafb;color:#475569;
  transition:background .12s,border-color .12s;white-space:nowrap;
}
.ab:hover{background:#f1f5f9;border-color:#cbd5e1;color:var(--ink)}
.ab-yt{}
.ab-sp{}
.ab-search{color:var(--muted)}

/* ── Charts section ─────────────────────────────────────────────── */
.chart-rows{display:flex;flex-direction:column;gap:8px}
.chart-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.chart-lang{font-size:11px;font-weight:600;color:var(--sub);
  min-width:100px;flex-shrink:0;white-space:nowrap}
.chart-btns{display:flex;gap:5px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:3px;
  padding:5px 10px;border-radius:6px;
  font-size:11px;font-weight:700;
  text-decoration:none;cursor:pointer;border:1.5px solid transparent;
  transition:opacity .12s;white-space:nowrap;line-height:1;
}
.btn:hover{opacity:.82}
/* View & Download: COLORED blue */
.btn-view{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-bd)}
.btn-save{background:var(--blue);color:#fff;border-color:var(--blue)}
/* Edit: gray */
.btn-edit{background:var(--dark-dim);color:var(--sub);border-color:var(--dark-bd)}
.btn-edit:hover{background:#e5e7eb;opacity:1}
.no-pdf{font-size:12px;color:var(--muted);font-style:italic}

/* ── Key section ─────────────────────────────────────────────────── */
.key-badge{font-family:var(--mono);font-size:26px;font-weight:900;
  color:var(--ink);line-height:1;text-align:center}
.key-from{font-size:10px;color:var(--muted);text-align:center;
  font-family:var(--mono);margin-top:1px}
.key-stepper{
  display:flex;align-items:center;gap:2px;
  background:var(--dark-dim);border:1.5px solid var(--dark-bd);
  border-radius:8px;padding:2px;
}
.key-step{
  width:28px;height:26px;border:none;background:transparent;
  color:var(--sub);font-size:14px;font-weight:800;cursor:pointer;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  transition:background .1s;font-family:inherit;
}
.key-step:hover{background:#e5e7eb;color:var(--ink)}
.key-cnt{font-size:10px;font-family:var(--mono);font-weight:700;
  color:var(--muted);min-width:20px;text-align:center}
.key-cnt.nonzero{color:var(--ink);font-weight:900}
/* View transposed: COLORED blue (it's a view button) */
.btn-view-tr{
  font-size:11px;font-weight:700;
  background:var(--blue);color:#fff;
  border:none;border-radius:7px;
  padding:5px 11px;cursor:pointer;
  transition:opacity .12s;
  display:flex;align-items:center;gap:4px;white-space:nowrap;
}
.btn-view-tr:hover{opacity:.85}
.key-reset{font-size:10px;color:var(--muted);background:none;border:none;
  cursor:pointer;padding:2px 4px;font-family:inherit}
.key-reset:hover{color:var(--sub)}

/* ── Chord editor modal ─────────────────────────────────────────── */
#modal{
  display:none;position:fixed;inset:0;
  background:rgba(10,12,28,.75);backdrop-filter:blur(5px);
  z-index:200;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:20px 16px 60px;
}
#modal-box{
  background:#fff;border-radius:14px;
  width:100%;max-width:900px;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.22),0 4px 16px rgba(0,0,0,.1);
}
#modal-head{
  background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;
  padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.mh-info{flex:1;min-width:0}
#modal-title{font-size:15px;font-weight:700;letter-spacing:-.1px}
#modal-meta{font-size:11px;opacity:.5;margin-top:1px}
.mh-key{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:8px;padding:5px 10px;
}
.mh-key-lbl{font-size:10px;opacity:.5;text-transform:uppercase;
  letter-spacing:.5px;font-weight:700}
.mh-semi{width:26px;height:26px;background:rgba(255,255,255,.12);border:none;
  border-radius:5px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .1s}
.mh-semi:hover{background:rgba(255,255,255,.25)}
#mh-key{font-size:18px;font-weight:900;font-family:var(--mono);
  min-width:2em;text-align:center}
#mh-offset{font-size:10px;font-weight:700;font-family:var(--mono);
  background:rgba(255,255,255,.18);border-radius:8px;padding:2px 6px;display:none}
#modal-close{width:30px;height:30px;background:rgba(255,255,255,.1);border:none;
  color:#fff;border-radius:7px;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .1s}
#modal-close:hover{background:rgba(255,255,255,.22)}
#chart-area{
  padding:14px 18px;overflow-x:auto;
  max-height:58vh;overflow-y:auto;
  background:#fafafa;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:13px;
}
.cc-loading{padding:24px;color:var(--muted);text-align:center;font-family:inherit}
.cc-section{
  font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--sub);margin:14px 0 5px;font-family:inherit;
}
.cc-section:first-child{margin-top:0}
.cc-spacer{height:8px}
.cc-group{margin-bottom:2px}
.cc-chord-row{position:relative;height:1.6em;line-height:1.6;cursor:crosshair}
.cc-chord{
  position:absolute;top:0;color:#374151;font-weight:800;font-size:12px;
  cursor:pointer;border-radius:4px;padding:1px 2px;user-select:none;
  transition:background .1s;
}
.cc-chord:hover{background:#e5e7eb}
.cc-chord-sel{background:var(--ink);color:#fff !important;border-radius:4px;
  padding:1px 5px;box-shadow:0 2px 6px rgba(0,0,0,.25)}
/* chord name input in editor bar */
#chord-edit-row{display:flex;align-items:center;gap:5px}
#chord-name-input{
  width:82px;padding:5px 8px;
  border:1.5px solid #cbd5e1;border-radius:6px;
  font-family:var(--mono);font-size:13px;font-weight:700;
  outline:none;background:#f8fafc;color:var(--ink);
  transition:border-color .15s,background .15s;
}
#chord-name-input:focus{border-color:var(--ink);background:#fff}
#chord-name-input:disabled{opacity:.35;cursor:default}
#chord-name-input::placeholder{font-weight:400;color:var(--muted)}
#chord-del-btn{
  padding:5px 9px;background:none;border:1.5px solid #e2e8f0;
  border-radius:6px;color:#dc2626;font-size:12px;font-weight:700;
  cursor:pointer;transition:background .1s,border-color .1s;line-height:1;
}
#chord-del-btn:hover{background:#fef2f2;border-color:#fca5a5}
#chord-del-btn:disabled{opacity:.3;cursor:default}
.cc-ref{white-space:pre;color:#94a3b8;font-size:12px;padding:0 2px;
  line-height:1.4;cursor:default;user-select:none}
.cc-lyric{
  white-space:pre;color:#1e293b;padding:2px 3px;border-radius:4px;
  line-height:1.5;outline:none;
  min-height:1.5em;
}
.cc-lyric:focus{background:#f8fafc;outline:1px solid var(--dark-bd)}
.cc-lyric-drop{cursor:crosshair;outline:2px dashed var(--dark) !important;
  outline-offset:1px;background:#f3f4f6}
.cc-group.active .cc-lyric:not(:focus){background:#f8fafc}
#editor-bar{
  padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:#fff;border-top:1px solid var(--border);
}
#editor-hint{flex:1;font-size:12px;color:var(--sub);
  display:flex;align-items:center;gap:5px}
.kbd{background:#f1f5f9;border:1px solid #cbd5e1;border-radius:4px;
  padding:1px 5px;font-size:10px;font-family:var(--mono)}
.editor-btns{display:flex;gap:7px}
#save-copy-btn{
  padding:7px 14px;background:#374151;color:#fff;border:none;
  border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s}
#save-copy-btn:disabled{opacity:.4;cursor:default}
#save-over-btn{
  padding:7px 14px;background:var(--dark-dim);color:var(--sub);
  border:1.5px solid var(--dark-bd);border-radius:7px;
  font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
#save-over-btn:hover:not(:disabled){background:#e5e7eb}
#save-over-btn:disabled{opacity:.4;cursor:default}

/* ── Toast ────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#111827;color:#fff;padding:9px 18px;border-radius:9px;
  font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);
  pointer-events:none;z-index:999;opacity:0;transition:opacity .18s;white-space:nowrap;
}
#toast.show{opacity:1}

/* ── Responsive ─────────────────────────────────────────────────── */
@media(max-width:640px){
  .topbar{padding:0 14px}
  .t-meta,.brand span{display:none}
  .page{padding:0 12px}
  .card-body{flex-direction:column}
  .cb-col+.cb-col{border-left:none;border-top:1px solid var(--border);
    padding-top:12px;padding-left:0}
  .cb-listen{min-width:0;width:100%}
  .cb-key{align-items:flex-start;flex-direction:row;flex-wrap:wrap;
    gap:8px;width:100%}
  #chart-area{max-height:44vh}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">Chord Charts<span>Mustard Seed Christian Church Tokyo</span></div>
  <span class="t-meta">99 Portuguese · 199 songs</span>
  <a class="t-zip" href="JP_PT_charts.zip" download>↓ PT charts</a>
  <a class="t-zip" href="JP_EN_charts.zip" download>↓ EN charts</a>
  <a class="t-zip" href="JP_PT_slides.zip" download>↓ PT slides</a>
</header>

<div class="page">
  <div class="search-area">
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input id="search" class="search" type="search"
             placeholder="Search by Portuguese title, English title, or CCLI…" oninput="render()">
    </div>
    <div class="filter-row">
      <button class="pill on" data-f="all" onclick="setFilt('all')">All Songs</button>
      <button class="pill"    data-f="pt"  onclick="setFilt('pt')">🇧🇷 Has Portuguese</button>
      <span class="rcount" id="count"></span>
    </div>
  </div>
  <div id="list"></div>
</div>

<div id="modal">
  <div id="modal-box">
    <div id="modal-head">
      <div class="mh-info">
        <div id="modal-title"></div>
        <div id="modal-meta"></div>
      </div>
      <div class="mh-key">
        <span class="mh-key-lbl">Key</span>
        <button class="mh-semi" onclick="mTrans(-1)">♭</button>
        <span id="mh-key">—</span>
        <button class="mh-semi" onclick="mTrans(+1)">♯</button>
        <span id="mh-offset"></span>
      </div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="chart-area"></div>
    <div id="editor-bar">
      <div id="editor-hint"></div>
      <div id="chord-edit-row">
        <input id="chord-name-input" type="text" placeholder="Chord…" maxlength="12"
               disabled autocomplete="off" autocorrect="off" autocapitalize="off"
               spellcheck="false" onkeydown="chordNameKey(event)">
        <button id="chord-del-btn" disabled onclick="deleteSelChord()">✕</button>
      </div>
      <div class="editor-btns">
        <button id="save-copy-btn" onclick="modalSave('copy')">Save Copy</button>
        <button id="save-over-btn" onclick="modalSave('over')">⚠ Overwrite</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

const ENARH={Db:'C#',Eb:'D#',Fb:'E',Gb:'F#',Ab:'G#',Bb:'A#',Cb:'B'};
function norm(n){return ENARH[n]||n}
function tNote(n,st){const i=NOTES.indexOf(norm(n));return i<0?n:NOTES[((i+st)%12+12)%12]}
function tChord(c,st){
  if(!c||st===0||!/^[A-G]/.test(c))return c;
  const m=c.match(/^([A-G][#b]?)(.*)/);if(!m)return c;
  const[,r,rest]=m;const si=rest.lastIndexOf('/');
  if(si>=0){const b=rest.slice(si+1),body=rest.slice(0,si);
    const bm=b.match(/^([A-G][#b]?)(.*)/);
    if(bm)return tNote(r,st)+body+'/'+tNote(bm[1],st)+bm[2];}
  return tNote(r,st)+rest;
}
function applyTrans(pairs,st){
  if(st===0)return pairs;
  return pairs.map(p=>({...p,chord_positions:Object.fromEntries(
    Object.entries(p.chord_positions||{}).map(([k,v])=>[k,tChord(v,st)]))}));
}

// ── State ────────────────────────────────────────────────────────────────────
let filt='all';
const tOff={};

function setFilt(f){
  filt=f;
  document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
  render();
}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let songs=SONGS;
  if(q) songs=songs.filter(s=>
    s.title.toLowerCase().includes(q)||
    (s.pt_title&&s.pt_title.toLowerCase().includes(q))||
    (s.jp_title&&s.jp_title.toLowerCase().includes(q))||
    (s.ccli&&s.ccli.includes(q)));
  if(filt==='pt') songs=songs.filter(s=>s.has_pt);

  document.getElementById('count').textContent=songs.length+' song'+(songs.length!==1?'s':'');

  const pt=songs.filter(s=>s.has_pt);
  const other=songs.filter(s=>!s.has_pt);
  const groups=filt==='all'&&!q&&pt.length&&other.length;

  let html='';
  if(pt.length){
    if(groups) html+=`<div class="gh"><span class="gh-lbl">With Portuguese (${pt.length})</span><div class="gh-line"></div></div>`;
    html+=`<div class="cards">`+pt.map(s=>buildCard(s,SONGS.indexOf(s))).join('')+`</div>`;
  }
  if(other.length&&filt!=='pt'){
    if(groups) html+=`<div class="gh" style="margin-top:12px"><span class="gh-lbl">Other songs (${other.length})</span><div class="gh-line"></div></div>`;
    html+=`<div class="cards">`+other.map(s=>buildCard(s,SONGS.indexOf(s))).join('')+`</div>`;
  }
  document.getElementById('list').innerHTML=html;
}

// ── Audio button helper ──────────────────────────────────────────────────────
function isSpecificYt(url){return url&&url.includes('watch?v=')}
function abtn(url,type){
  if(!url)return'';
  const isSpec=type==='yt'?isSpecificYt(url):true;
  const cls=type==='yt'?(isSpec?'ab-yt':'ab-search')
           :type==='sp'?'ab-sp':'ab-search';
  const lbl=type==='yt'?(isSpec?'YouTube':'🔍 YouTube'):'Spotify';
  return`<a class="ab ${cls}" href="${escA(url)}" target="_blank" rel="noopener">${lbl}</a>`;
}

// ── Card builder ─────────────────────────────────────────────────────────────
function buildCard(s,si){
  const hasPt=s.has_pt;
  const meta=[s.ccli?'CCLI '+s.ccli:'',s.arr&&s.arr!==s.title?s.arr:''].filter(Boolean).join(' · ');

  const badges=[
    hasPt?`<span class="bdg bdg-pt">PT</span>`:'',
    !hasPt&&(s.pdf_jp_en||s.pdf_jp_en_url)?`<span class="bdg bdg-en">EN</span>`:'',
  ].filter(Boolean).join('');

  // Title hierarchy: PT is highest priority
  // For PT songs: main = Portuguese title, sub = English title
  // For non-PT: main = English title (or Japanese if Song Title is Japanese)
  const hasPtTitle=hasPt&&s.pt_title;
  const mainTitle=hasPtTitle?s.pt_title:s.title;
  const subTitle=hasPtTitle?s.title:'';
  const subHTML=subTitle?`<div class="card-title-sub">${esc(subTitle)}</div>`:'';
  const jpHTML=s.jp_title?`<div class="card-title-jp">${esc(s.jp_title)}</div>`:'';

  // ── Listen column ──
  const jpYt=abtn(s.yt_jp||s.yt_search,'yt');
  const jpSp=abtn(s.sp_jp||s.sp_search,'sp');
  const ptYt=abtn(s.yt_pt,'yt');
  const ptSp=abtn(s.sp_pt,'sp');

  const listenRows=[];
  if(jpYt||jpSp) listenRows.push(`<div class="listen-row">
    <span class="listen-flag">🇯🇵</span>
    <div class="listen-btns">${jpYt}${jpSp}</div></div>`);
  if(ptYt||ptSp) listenRows.push(`<div class="listen-row">
    <span class="listen-flag">🇧🇷</span>
    <div class="listen-btns">${ptYt}${ptSp}</div></div>`);

  const listenCol=listenRows.length?`<div class="cb-col cb-listen">
    <div class="slbl">Listen</div>
    <div class="listen-rows">${listenRows.join('')}</div>
  </div>`:'';

  // ── Charts column ──
  const enV=s.pdf_jp_en||s.pdf_jp_en_url;
  const ptV=s.pdf_jp_pt||s.pdf_jp_pt_url;
  const hasPairs=s.pt_pairs&&s.pt_pairs.length>0;

  const chartRows=[];
  if(enV) chartRows.push(`<div class="chart-row">
    <span class="chart-lang">JP + English</span>
    <div class="chart-btns">
      <a class="btn btn-view" href="${escA(enV)}" target="_blank">View</a>
      <a class="btn btn-save" href="${escA(enV)}" download>↓ Save</a>
    </div></div>`);
  if(ptV) chartRows.push(`<div class="chart-row">
    <span class="chart-lang">JP + Portuguese</span>
    <div class="chart-btns">
      <a class="btn btn-view" href="${escA(ptV)}" target="_blank">View</a>
      <a class="btn btn-save" href="${escA(ptV)}" download>↓ Save</a>
      ${hasPairs?`<button class="btn btn-edit" onclick="openEditor(${si})">✏ Edit</button>`:''}
    </div></div>`);
  if(s.pptx) chartRows.push(`<div class="chart-row">
    <span class="chart-lang">🎞 PT Slides</span>
    <div class="chart-btns">
      <a class="btn btn-save" href="${escA(s.pptx)}" download>↓ Save</a>
    </div></div>`);
  if(!enV&&!ptV) chartRows.push(`<p class="no-pdf">No PDF available yet.</p>`);

  const chartsCol=`<div class="cb-col cb-charts">
    <div class="slbl">Chord Charts</div>
    <div class="chart-rows">${chartRows.join('')}</div>
  </div>`;

  // ── Key column ──
  const off=tOff[si]||0;
  const hasTr=(hasPairs)&&s.key;
  let keyInner='';
  if(s.key){
    const displayKey=off!==0?tNote(s.key,off):s.key;
    const cnt=off===0?'±0':(off>0?'+'+off:String(off));
    keyInner+=`<div class="key-badge">${esc(displayKey)}</div>`;
    if(off!==0) keyInner+=`<div class="key-from">from ${esc(s.key)}</div>`;
    if(hasTr){
      keyInner+=`<div class="key-stepper">
        <button class="key-step" onclick="trShift(event,${si},-1)" title="Lower one semitone">♭</button>
        <span class="key-cnt${off!==0?' nonzero':''}">${cnt}</span>
        <button class="key-step" onclick="trShift(event,${si},+1)" title="Raise one semitone">♯</button>
      </div>`;
      if(off!==0){
        keyInner+=`<button class="btn-view-tr" onclick="viewTransposed(event,${si})">View ↗</button>
        <button class="key-reset" onclick="trReset(event,${si})">✕ reset</button>`;
      }
    }
  }
  const keyCol=s.key?`<div class="cb-col cb-key">
    <div class="slbl">Key</div>${keyInner}
  </div>`:'';

  return`<div class="card${hasPt?' has-pt':''}" id="card-${si}">
    <div class="card-head">
      <div class="card-title-block">
        <div class="card-title">${esc(mainTitle)}</div>
        ${subHTML}
        ${jpHTML}
        ${meta?`<div class="card-sub">${esc(meta)}</div>`:''}
      </div>
      <div class="card-badges">${badges}</div>
    </div>
    <div class="card-body">
      ${listenCol}${chartsCol}${keyCol}
    </div>
  </div>`;
}

// ── Transpose ────────────────────────────────────────────────────────────────
function trShift(e,si,d){
  e.stopPropagation();
  tOff[si]=(((tOff[si]||0)+d)%12+12)%12;
  refreshCard(si);
}
function trReset(e,si){e.stopPropagation();tOff[si]=0;refreshCard(si)}
function refreshCard(si){
  const el=document.getElementById('card-'+si);
  if(el) el.outerHTML=buildCard(SONGS[si],si);
}

// ── View transposed (client-side, works on GitHub Pages) ─────────────────────
function viewTransposed(e,si){
  e.stopPropagation();
  const s=SONGS[si];const off=tOff[si]||0;
  if(!s.pt_pairs||!s.pt_pairs.length)return;
  const newKey=tNote(s.key||'C',off);
  const pairs=applyTrans(s.pt_pairs,off);

  let body='';let lastSec=null;
  pairs.forEach(pair=>{
    if(pair.section&&pair.section!==lastSec){
      body+=`<div class="sec-hdr">${esc(pair.section)}</div>`;
      lastSec=pair.section;
    }
    const lyric=pair.lyric||'';
    const entries=Object.entries(pair.chord_positions||{}).sort((a,b)=>+a[0]-+b[0]);
    if(!entries.length){body+=lyric?`<div class="lyric">${esc(lyric)}</div>`:'';return;}
    let maxEnd=0;
    const placed=entries.map(([pos,ch])=>{
      const p=parseInt(pos);const chord=tChord(ch,0);
      maxEnd=Math.max(maxEnd,p+chord.length+2);return{p,chord};
    });
    maxEnd=Math.max(maxEnd,lyric.length+2);
    const arr=new Array(maxEnd).fill(' ');
    placed.forEach(({p,chord})=>{for(let i=0;i<chord.length;i++){if(p+i<arr.length)arr[p+i]=chord[i];}});
    body+=`<div class="pair"><div class="chord">${esc(arr.join('').trimEnd())}</div><div class="lyric">${esc(lyric)||' '}</div></div>`;
  });

  const meta=[s.ccli?'CCLI '+s.ccli:'',s.arr&&s.arr!==s.title?s.arr:'',
    off!==0?'Transposed from '+s.key+' → '+newKey:'Key of '+newKey].filter(Boolean).join(' · ');
  const ptTitle=s.pt_title?`<div class="pt-title">${esc(s.pt_title)}</div>`:'';

  const html=`<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>${esc(s.title)} — ${newKey}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  padding:36px 48px;color:#0f172a;background:#fff;line-height:1.5}
h1{font-size:20px;font-weight:800;margin-bottom:2px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.key-chip{background:#111;color:#fff;font-family:'SF Mono','Courier New',monospace;
  font-size:16px;font-weight:900;border-radius:7px;padding:3px 13px}
.pt-title{font-size:13px;color:#64748b;margin-bottom:2px}
.meta{font-size:11px;color:#94a3b8;margin-bottom:28px}
.sec-hdr{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;
  color:#64748b;margin:22px 0 5px;font-family:'SF Mono','Courier New',monospace}
.pair{margin-bottom:2px}
.chord{font-family:'SF Mono','Courier New',monospace;font-size:12px;font-weight:700;
  color:#374151;white-space:pre;line-height:1.5}
.lyric{font-family:'SF Mono','Courier New',monospace;font-size:13px;
  white-space:pre;line-height:1.5;margin-bottom:5px}
.print-btn{position:fixed;top:20px;right:20px;padding:9px 18px;
  background:#111;color:#fff;border:none;border-radius:8px;
  font-size:13px;font-weight:700;cursor:pointer}
.print-btn:hover{background:#333}
@media print{.print-btn{display:none}body{padding:20px 24px}}
</style></head><body>
<button class="print-btn" onclick="window.print()">⬇ Save as PDF</button>
<h1>${esc(s.title)} <span class="key-chip">${newKey}</span></h1>
${ptTitle}<div class="meta">${meta}</div>${body}
</body></html>`;

  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
  else{toast('Allow pop-ups to view the transposed chart','err');}
}

render();

// ── Chord editor modal ────────────────────────────────────────────────────────
let aS=null,aP=null,aJP=[],mSt=0,selCh=null,mMod=false,chordAdd=null,ccCharW=0;

function measureCCCharW(){
  // Measure the monospace character width used by #chart-area (SF Mono 13px)
  // Do this once and cache — avoids unreliable in-contenteditable measurements
  const s=document.createElement('span');
  s.style.cssText='position:fixed;top:-9999px;left:-9999px;visibility:hidden;'+
    "white-space:pre;font-family:'SF Mono','Fira Mono','Courier New',monospace;font-size:13px";
  s.textContent='MMMMMMMMMM';
  document.body.appendChild(s);
  ccCharW=s.getBoundingClientRect().width/10||7.8;
  document.body.removeChild(s);
}

async function openEditor(si){
  const s=SONGS[si];
  if(!s?.pt_pairs?.length)return;
  aS=s;aP=JSON.parse(JSON.stringify(s.pt_pairs));
  mSt=0;selCh=null;chordAdd=null;mMod=false;aJP=[];
  measureCCCharW();

  document.getElementById('modal-title').textContent=s.title;
  document.getElementById('modal-meta').textContent=
    [s.ccli?'CCLI '+s.ccli:'',s.key?'Key of '+s.key:''].filter(Boolean).join(' · ');
  updMKey();

  document.getElementById('chart-area').innerHTML='<div class="cc-loading">Loading chart…</div>';
  document.getElementById('modal').style.display='flex';
  document.body.style.overflow='hidden';

  try{
    const r=await fetch(`${EDITOR_BASE}/api/song/${encodeURIComponent(s.title)}`);
    if(r.ok){const d=await r.json();aJP=parseJpLines(d.chart_text||'');}
  }catch(e){}
  renderChart();
}

function parseJpLines(text){
  const out=[];let isEn=false;
  for(const raw of text.split('\n')){
    const line=raw.trim();
    if(!line||line==='COLUMN_BREAK')continue;
    if(!/\[[A-G]/.test(line)&&(
      /^(verse|chorus|bridge|pre|intro|outro|tag|refrain|vamp|coda|section)/i.test(line)||
      (/:/.test(line)&&line.length<70&&!/https?:/.test(line))
    )){isEn=/\bENG\b|\bENGLISH\b/i.test(line);continue;}
    if(isEn)continue;
    if(/\[[A-G][^\]]*\]/.test(line)){
      const lyric=line.replace(/\[[^\]]*\]/g,'').replace(/\s+/g,' ').trim();
      if(/[぀-ゟ゠-ヿ一-鿿]/.test(lyric)){out.push(lyric);}continue;
    }
    if(/[぀-ゟ゠-ヿ一-鿿]/.test(line)&&!isEn){out.push(line);}
  }
  return out;
}

function closeModal(){
  if(mMod&&!confirm('Discard unsaved changes?'))return;
  document.getElementById('modal').style.display='none';
  document.body.style.overflow='';
  aS=null;aP=null;aJP=[];selCh=null;chordAdd=null;mMod=false;
}
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('modal').style.display==='flex'){
    closeModal();return;
  }
  if(!selCh||document.getElementById('modal').style.display==='none')return;
  if(e.target.id==='chord-name-input')return; // let the input handle its own keys
  if(e.key!=='ArrowLeft'&&e.key!=='ArrowRight')return;
  e.preventDefault();
  const d=e.key==='ArrowLeft'?-1:1;
  const pair=aP[selCh.li];
  const ch=pair.chord_positions[selCh.ps];if(ch===undefined)return;
  const np=String(Math.max(0,+selCh.ps+d)); // no upper bound — allow past end of lyric
  if(np!==selCh.ps){
    delete pair.chord_positions[selCh.ps];pair.chord_positions[np]=ch;
    selCh={li:selCh.li,ps:np};mMod=true;renderChart();
  }
});

function mTrans(d){mSt=((mSt+d)%12+12)%12;updMKey();renderChart()}
function updMKey(){
  const b=aS?.key||'';
  document.getElementById('mh-key').textContent=b?tNote(b,mSt):'—';
  const badge=document.getElementById('mh-offset');
  badge.textContent=mSt===0?'':(mSt>0?'+'+mSt:String(mSt));
  badge.style.display=mSt===0?'none':'inline';
}

function renderChart(){
  if(!aP)return;
  const c=document.getElementById('chart-area');
  const f=[];let lastSec=null;let jpIdx=0;

  aP.forEach((pair,li)=>{
    if(pair.section&&pair.section!==lastSec){
      if(lastSec!==null)f.push('<div class="cc-spacer"></div>');
      f.push(`<div class="cc-section">${esc(pair.section)}</div>`);
      lastSec=pair.section;
    }
    const lyric=pair.lyric||'';
    const entries=Object.entries(pair.chord_positions||{}).sort((a,b)=>+a[0]-+b[0]);
    const isAct=selCh&&selCh.li===li;

    let cr='';
    entries.forEach(([ps,ch])=>{
      const tc=tChord(ch,mSt);const isSel=isAct&&selCh.ps===ps;
      cr+=`<span class="cc-chord${isSel?' cc-chord-sel':''}" style="left:calc(${ps}*1ch)"
        onmousedown="chordMD(event,${li},'${ps}')">${esc(tc)}</span>`;
    });

    const jpLine=aJP[jpIdx]||'';
    if(aJP.length>0)jpIdx++;
    const refHTML=jpLine?`<div class="cc-ref" title="Japanese reference">${esc(jpLine)}</div>`:'';

    f.push(`<div class="cc-group${isAct?' active':''}">
      <div class="cc-chord-row" onmousedown="chordRowBg(event,${li})">${cr||' '}</div>
      ${refHTML}
      <div class="cc-lyric${isAct?' cc-lyric-drop':''}"
           contenteditable="true" spellcheck="false"
           onmousedown="lyricMD(event,${li})"
           oninput="lyricIn(event,${li})"
           onkeydown="lyricKey(event,${li})">${esc(lyric)||'&nbsp;'}</div>
    </div>`);
  });

  c.innerHTML=f.join('')||'<div class="cc-loading">No chord data.</div>';
  updEdBar();
}

function chordMD(e,li,ps){
  e.stopPropagation();
  selCh=(selCh&&selCh.li===li&&selCh.ps===ps)?null:{li,ps};
  renderChart();
}

function lyricMD(e,li){
  if(!selCh)return; // no chord selected — allow normal contenteditable focus
  e.preventDefault(); // block contenteditable cursor when chord is selected
  if(selCh.li!==li){selCh=null;renderChart();return;}
  // Lyric div has 3px left padding — subtract so char 0 aligns with chord position 0
  // No upper bound: chords can live past the end of the lyric text
  const relX=e.clientX-e.currentTarget.getBoundingClientRect().left-3;
  const np=String(Math.max(0,Math.round(relX/ccCharW)));
  const pair=aP[li];const ch=pair.chord_positions[selCh.ps];
  if(ch!==undefined&&np!==selCh.ps){
    delete pair.chord_positions[selCh.ps];pair.chord_positions[np]=ch;
    selCh={li,ps:np};mMod=true;
  }
  renderChart();
}

function lyricIn(e,li){
  // Update lyric in data model without re-rendering (preserves cursor)
  let text=e.currentTarget.innerText||'';
  text=text.split('\n')[0].replace(/ /g,' ').replace(/​/g,'');
  aP[li].lyric=text;
  mMod=true;
}

function lyricKey(e,li){
  if(e.key==='Enter'){e.preventDefault();return;}
  if(e.key==='Escape'){e.currentTarget.blur();selCh=null;renderChart();}
}

function updEdBar(){
  const h   = document.getElementById('editor-hint');
  const inp = document.getElementById('chord-name-input');
  const del = document.getElementById('chord-del-btn');

  if(selCh){
    const raw = aP[selCh.li]?.chord_positions[selCh.ps]||'';
    inp.value    = raw;
    inp.disabled = false;
    del.disabled = false;
    h.innerHTML=`<span class="kbd">←</span><span class="kbd">→</span> move &nbsp;·&nbsp; click lyric to reposition &nbsp;·&nbsp; rename in box above &nbsp;·&nbsp; <em style="color:var(--muted)">Esc = deselect</em>`;
  } else if(chordAdd){
    inp.value    = '';
    inp.disabled = false;
    del.disabled = true;
    requestAnimationFrame(()=>{ inp.focus(); });
    h.innerHTML=`Type chord name &amp; press <span class="kbd">Enter</span> to add &nbsp;·&nbsp; <em style="color:var(--muted)">Esc = cancel</em>`;
  } else {
    inp.value    = '';
    inp.disabled = true;
    del.disabled = true;
    h.innerHTML=`Click a <strong>chord</strong> to rename or reposition it. Click <strong>blank chord row space</strong> to add a chord. Click a <strong>lyric</strong> to edit text.`;
  }
  document.getElementById('save-over-btn').disabled=false;
  document.getElementById('save-copy-btn').disabled=false;
}

// ── Chord add / rename / delete ──────────────────────────────────────────────
function chordRowBg(e, li){
  // Ignore clicks that land on an existing chord span — let chordMD handle those
  if(e.target.classList.contains('cc-chord'))return;
  e.preventDefault();

  const relX=e.clientX-e.currentTarget.getBoundingClientRect().left;
  const pos=String(Math.max(0,Math.round(relX/ccCharW)));

  if(selCh){
    // Chord already selected — reposition it to where we clicked on the row
    // (chord row has no padding, so relX maps directly to char position)
    if(selCh.li!==li){selCh=null;renderChart();return;}
    const pair=aP[li];const ch=pair.chord_positions[selCh.ps];
    if(ch!==undefined&&pos!==selCh.ps){
      delete pair.chord_positions[selCh.ps];pair.chord_positions[pos]=ch;
      selCh={li,ps:pos};mMod=true;
    }
    renderChart();
  } else {
    // No chord selected — enter add-chord mode
    chordAdd={li,pos};
    renderChart();
    updEdBar();
  }
}

function chordNameKey(e){
  if(e.key==='Enter'){ e.preventDefault(); applyChordName(); }
  if(e.key==='Escape'){
    selCh=null; chordAdd=null;
    renderChart(); updEdBar();
  }
}

function applyChordName(){
  const name=document.getElementById('chord-name-input').value.trim().replace(/\s+/g,'');
  if(selCh){
    // Rename: update chord name at its current position
    const chords=aP[selCh.li].chord_positions;
    if(name){
      chords[selCh.ps]=name;
    } else {
      delete chords[selCh.ps]; // empty name = delete
    }
    mMod=true; selCh=null;
    renderChart(); updEdBar();
  } else if(chordAdd){
    // Add new chord at the computed position
    if(name){
      aP[chordAdd.li].chord_positions[chordAdd.pos]=name;
      mMod=true;
    }
    chordAdd=null;
    renderChart(); updEdBar();
  }
}

function deleteSelChord(){
  if(!selCh)return;
  delete aP[selCh.li].chord_positions[selCh.ps];
  mMod=true; selCh=null;
  renderChart(); updEdBar();
}

async function modalSave(mode){
  if(!aS||!aP)return;
  const pSave=applyTrans(aP,mSt);
  const newKey=aS.key?tNote(aS.key,mSt):null;
  if(mode==='over'&&!confirm(`⚠ Permanently overwrite "${aS.title}"?\n\nThis cannot be undone.`))return;
  const ob=document.getElementById('save-over-btn');
  const cb=document.getElementById('save-copy-btn');
  [ob,cb].forEach(b=>b.disabled=true);
  (mode==='over'?ob:cb).textContent='Saving…';
  try{
    const t=encodeURIComponent(aS.title);
    if(mode==='over'){
      const r1=await fetch(`${EDITOR_BASE}/api/song/${t}/pairs`,
        {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(pSave)});
      if(!r1.ok)throw new Error('Save failed — is editor running locally?');
      const r2=await fetch(`${EDITOR_BASE}/api/song/${t}/regenerate`,
        {method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
      const res=await r2.json();if(!res.ok)throw new Error(res.stderr||'Regen failed');
      aP=pSave;aS.pt_pairs=pSave;mSt=0;mMod=false;
      toast('Saved — key of '+(newKey||'?'),'ok');updMKey();renderChart();
    } else {
      const r=await fetch(`${EDITOR_BASE}/api/song/${t}/regenerate-copy`,
        {method:'POST',headers:{'Content-Type':'application/json'},
         body:JSON.stringify({new_key:newKey||'X',pairs:pSave})});
      const res=await r.json();if(!res.ok)throw new Error(res.stderr||'Copy failed');
      toast('Copy saved: '+res.filename,'ok');
    }
    ob.textContent='⚠ Overwrite';cb.textContent='Save Copy';
    [ob,cb].forEach(b=>b.disabled=false);
  }catch(err){
    toast('Error: '+err.message,'err');
    ob.textContent='⚠ Overwrite';cb.textContent='Save Copy';
    [ob,cb].forEach(b=>b.disabled=false);
  }
}
</script>
